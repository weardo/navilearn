name: Deploy to Oracle
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**"]
  workflow_dispatch:
jobs:
  deploy:
    uses: weardo/infra/.github/workflows/deploy-oracle.yml@main
    with:
      app: navilearn
      deploy_path: /opt/navilearn
      port: "8600"
      healthcheck_path: /
    secrets: inherit
